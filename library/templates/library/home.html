<!-- Enhanced Home Page - home.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">📚 Library Management</a>
        </div>
    </nav>
    <div class="container text-center mt-5">
        <h1 class="display-4">Welcome to the Library Management System</h1>
        <p class="lead">Find and manage books with ease.</p>
        <!-- <a href="/books/" class="btn btn-primary mt-3">View Books</a> -->
        <a href="/book-list/" class="btn btn-primary mt-3">View Books</a>
    </div>
</body>
</html>
